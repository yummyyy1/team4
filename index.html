<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4조 탐험 지도</title>
    <style>
        body { background-color: #f4e4bc; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { color: #5d4037; text-shadow: 1px 1px 2px white; z-index: 1; margin-bottom: 0;}
        p.subtitle { margin-top: 5px; color: #7f5539; font-size: 1.1rem; font-weight: bold; }
        
        /* 지도 컨테이너 */
        .map-wrapper { position: relative; border: 12px solid #8b4513; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; background: #eee; display: inline-block; }
        .map-wrapper img { display: block; max-width: 100%; height: auto; }
        
        /* SVG 경로 레이어 */
        #path-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .quest-line { stroke: #FFD700; stroke-width: 6; stroke-dasharray: 12, 12; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.9)); transition: stroke-dashoffset 1.5s linear; stroke-dashoffset: 1000; }

        /* 지도 위 버튼 */
        .person { 
            position: absolute; width: 65px; height: 65px; 
            cursor: pointer; z-index: 10; border-radius: 50%;
            border: 3px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            background-size: cover; background-position: center;
            transition: transform 0.3s ease, filter 0.3s, opacity 0.3s;
            filter: grayscale(80%); opacity: 0.8;
        }
        .person.active { filter: grayscale(0%); opacity: 1; pointer-events: auto; }
        .person.locked { pointer-events: none; }
        .person.active:hover { transform: scale(1.8) rotate(5deg); z-index: 20; border-color: gold; }

        /* 버튼 위치 */
        #p1 { top: 32%; left: 18%; }
        #p2 { top: 49%; left: 30%; }
        #p3 { top: 55%; left: 58%; }
        #p4 { top: 48%; left: 88%; }
        #p5 { top: 25%; left: 80%; }

        /* 완료하기 버튼 */
        .finish-btn {
            position: absolute; bottom: 20px; right: 20px;
            padding: 10px 20px; background: #5d4037; color: white;
            border: 2px solid gold; border-radius: 10px; cursor: pointer;
            font-weight: bold; z-index: 30; transition: 0.3s;
        }
        .finish-btn:hover { background: #8b4513; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* [핵심] 탐험 완료 단체사진 팝업 스타일 */
        #finish-modal {
            display: none; /* 평소엔 숨김 */
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 450px; /* 사진 크기에 맞춰 넉넉하게 */
            background: #fffcf5;
            border: 8px solid gold;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 300; /* 가장 위에 띄움 */
            text-align: center;
            overflow: hidden;
            animation: popIn 0.5s ease; /* 팝업 등장 애니메이션 */
        }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* 단체 사진 */
        #finish-modal img.group-photo {
            width: 100%;
            height: auto;
            border-bottom: 5px solid gold;
        }
        /* 완료 메시지 */
        #finish-modal h2 {
            margin: 20px 0;
            color: #5d4037;
            font-size: 1.8rem;
        }
        /* 확인 버튼 */
        #finish-modal .final-btn {
            background: #8b4513;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.2s;
        }
        #finish-modal .final-btn:hover { background: gold; color: #5d4037; }

        /* 배경 어둡게 */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }

        /* 시작 화면 */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; transition: 0.5s; }
        #start-screen h2 { font-size: 2.5rem; color: gold; white-space: nowrap; margin-bottom: 20px;}
        .start-btn { padding: 15px 40px; font-size: 1.5rem; background: #8b4513; color: white; border: 3px solid gold; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>🤖 AI공학개론 4조 탐험하기</h2>
        <button class="start-btn" onclick="startAdventure()">탐험 시작하기</button>
    </div>

    <h1>🗺️ 4조 탐험 지도</h1>
    <p class="subtitle">팀원을 클릭하여 탐험해보세요!</p>

    <div class="map-wrapper">
        <img src="85E5E5D9-C0CF-44FB-BA94-082BD6E083EB.png" alt="팀 지도">
        <svg id="path-layer" width="100%" height="100%"></svg>
        
        <div id="p1" class="person locked" style="background-image: url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png');" onclick="clickPerson(1)"></div>
        <div id="p2" class="person locked" style="background-image: url('IMG_3332.jpeg');" onclick="clickPerson(2)"></div>
        <div id="p3" class="person locked" style="background-image: url('IMG_3331.jpeg');" onclick="clickPerson(3)"></div>
        <div id="p4" class="person locked" style="background-image: url('IMG_3333.jpeg');" onclick="clickPerson(4)"></div>
        <div id="p5" class="person locked" style="background-image: url('IMG_3334.jpeg');" onclick="clickPerson(5)"></div>

        <button class="finish-btn" onclick="finishAll()">탐험 완료하기</button>
    </div>

    <div id="finish-modal">
        <img src="9176C6C6-4ECE-4CE4-82BF-6A7402467888.png" alt="4조 단체사진" class="group-photo">
        <h2>🎉 탐험 완료! 수고하셨습니다.</h2>
        <button class="final-btn" onclick="closeGroupModal()">지도보기</button>
    </div>

    <div id="overlay"></div>

    <script>
        let currentStep = 0;

        function startAdventure() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                activatePerson(1);
            }, 500);
        }

        function activatePerson(step) {
            currentStep = step;
            const target = document.getElementById('p' + step);
            target.classList.remove('locked');
            target.classList.add('active');
        }

        function clickPerson(step) {
            if (step !== currentStep && !document.getElementById('p'+step).classList.contains('active')) return;
            // (개별 정보 팝업 로직은 기존 코드 그대로 유지해주세요)
            // 여기선 예시로 개별 팝업 대신 완료 확인만 가능하게 함
            activatePerson(step + 1); // 클릭 시 다음 사람 활성화
        }

        // [수정] 완료 로직 - 단체사진 팝업 띄우기
        function finishAll() {
            for(let i=1; i<5; i++) {
                if(!document.getElementById('line-'+i)) {
                    drawPath(i, i+1, true); 
                }
            }
            for(let i=1; i<=5; i++) {
                const p = document.getElementById('p' + i);
                p.classList.remove('locked');
                p.classList.add('active');
            }
            currentStep = 5;

            // 핵심: 알림창 대신 팝업창 띄우기
            document.getElementById('finish-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        // 단체사진 팝업 닫기
        function closeGroupModal() {
            document.getElementById('finish-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function drawPath(fromIdx, toIdx, instant = false) {
            if(document.getElementById('line-'+fromIdx)) return;
            const fromEl = document.getElementById('p' + fromIdx);
            const toEl = document.getElementById('p' + toIdx);
            const svg = document.getElementById('path-layer');
            const x1 = fromEl.offsetLeft + 32.5;
            const y1 = fromEl.offsetTop + 32.5;
            const x2 = toEl.offsetLeft + 32.5;
            const y2 = toEl.offsetTop + 32.5;
            
            const newLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (x1 + x2) / 2 + (toIdx % 2 === 0 ? 30 : -30); 
            const midY = (y1 + y2) / 2 - 50;
            const d = `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
            
            newLine.setAttribute("d", d);
            newLine.setAttribute("class", "quest-line");
            newLine.setAttribute("id", "line-" + fromIdx);
            
            svg.appendChild(newLine);

            const totalLen = newLine.getTotalLength();
            newLine.style.strokeDashoffset = totalLen;

            if(instant) {
                newLine.style.transition = 'none';
                newLine.style.strokeDashoffset = "0";
            } else {
                requestAnimationFrame(() => {
                    newLine.style.strokeDashoffset = "0";
                });
            }
        }
    </script>
</body>
</html>
