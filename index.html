<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 공학개론 4조 탐험</title>
    <style>
        /* [폰트] 손글씨 및 세리프체 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Serif+KR:wght@400;700&display=swap');

        body { 
            background-color: #FDF5E6; 
            font-family: 'Noto Serif KR', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 40px; 
            color: #5D4037; 
        }

        h1.main-title { font-size: 3rem; margin-bottom: 10px; color: #8B4513; }
        p.subtitle { margin-bottom: 50px; font-size: 1.2rem; color: #795548; }

        /* 섹션 공통 스타일 */
        .section { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 70px; 
            max-width: 900px; 
            width: 100%; 
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(93, 64, 55, 0.1);
        }
        h3.section-label { font-size: 1.5rem; color: #8B4513; align-self: flex-start; margin-bottom: 20px; border-bottom: 2px solid #FFD700; }

        /* [1] 단체사진 */
        .photo-box { width: 100%; border-radius: 15px; overflow: hidden; border: 5px solid #FDF5E6; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .photo-box img { width: 100%; display: block; }

        /* [2] 지도 탐험 */
        .map-wrapper { position: relative; border: 10px solid #8B4513; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; line-height: 0; }
        .map-wrapper img { max-width: 100%; height: auto; }
        #path-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .quest-line { stroke: #DAA520; stroke-width: 6; stroke-dasharray: 12, 12; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 5px rgba(218, 165, 32, 0.7)); transition: stroke-dashoffset 1.5s linear; }

        .person { position: absolute; width: 65px; height: 65px; cursor: pointer; z-index: 10; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.3); background-size: cover; background-position: center; transition: 0.3s; filter: grayscale(100%); opacity: 0.7; }
        .person.active { filter: grayscale(0%); opacity: 1; }
        .person.active:hover { transform: scale(1.2); border-color: gold; z-index: 20; }

        #p1 { top: 32%; left: 18%; }
        #p2 { top: 49%; left: 30%; }
        #p3 { top: 55%; left: 58%; }
        #p4 { top: 48%; left: 88%; }
        #p5 { top: 25%; left: 80%; }

        /* [3] Teachable Machine 거대 버튼 */
        .tm-mega-button {
            width: 100%; background: #fff; border: 2px solid #DAA520; border-radius: 20px; padding: 30px;
            cursor: pointer; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s;
            display: flex; flex-direction: column; gap: 10px; box-sizing: border-box;
        }
        .tm-mega-button:hover { transform: translateY(-5px); background: #FAF0E6; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .tm-title { font-size: 1.6rem; font-weight: bold; margin: 0; }
        .tm-desc { font-size: 1rem; color: #795548; margin: 0; }

        /* [팝업] 스크랩북 스타일 (노란 네모 제거됨) */
        .modal-container { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 380px; height: 520px; z-index: 1000; 
        }
        .modal-content { 
            position: relative; width: 100%; height: 100%; background: #fffcf5; 
            background-image: url('https://www.transparenttextures.com/patterns/crumbled-paper.png'); 
            border-radius: 5px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); padding: 35px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        .modal-content h2 { font-family: 'Nanum Pen Script', cursive; color: #795548; font-size: 2.8rem; margin: 0 0 15px 0; border-bottom: 2px solid #a0522d; display: inline-block; }
        
        .modal-photo-area { position: relative; width: 110px; height: 140px; margin-bottom: 25px; }
        .modal-photo { width: 100%; height: 100%; background-size: cover; background-position: center; border: 6px solid white; box-shadow: 3px 3px 10px rgba(0,0,0,0.2); }
        /* 클립 데코 */
        .modal-photo-area::before { content: ''; position: absolute; top: -15px; left: 10px; width: 25px; height: 45px; background: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Paperclip.svg') no-repeat; background-size: contain; z-index: 2; }
        /* 마스킹 테이프 */
        .modal-photo-area::after { content: ''; position: absolute; top: -10px; right: -25px; width: 70px; height: 25px; background: rgba(218, 165, 32, 0.5); transform: rotate(15deg); z-index: 1; }

        .info-item { display: flex; margin-bottom: 8px; font-size: 0.95rem; }
        .info-label { font-family: 'Nanum Pen Script', cursive; font-size: 1.5rem; color: #a0522d; width: 70px; flex-shrink: 0; }
        .info-content { margin-top: 5px; }

        .modal-deco { position: absolute; bottom: 80px; right: 30px; text-align: right; }
        .stamp { width: 70px; height: 70px; border: 3px solid #795548; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #795548; font-weight: bold; font-size: 0.7rem; transform: rotate(-15deg); font-family: 'Nanum Pen Script', cursive; opacity: 0.6; }

        .close-btn { margin-top: auto; background: #5d4037; color: #fff; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .close-btn:hover { background: #3e2723; }

        /* 티처블 전용 심플 모달 */
        #tm-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; border: 3px solid #DAA520; z-index: 1001; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 900; }
    </style>
</head>
<body>

    <h1 class="main-title">AI 공학개론 4조</h1>
    <p class="subtitle">지도를 클릭하여 저희 조원들을 탐험해보세요!</p>

    <div class="section">
        <h3 class="section-label">우리 조를 소개합니다!</h3>
        <div class="photo-box">
            <img src="9176C6C6-4ECE-4CE4-82BF-6A7402467888.png" alt="단체사진">
        </div>
    </div>

    <div class="section">
        <h3 class="section-label">조원 탐험하기</h3>
        <div class="map-wrapper">
            <img src="85E5E5D9-C0CF-44FB-BA94-082BD6E083EB.png" alt="지도">
            <svg id="path-layer"></svg>
            <div id="p1" class="person" style="background-image: url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png');" onclick="clickPerson(1)"></div>
            <div id="p2" class="person" style="background-image: url('49542EE6-31E8-431D-8DE3-686F737E7B87.png');" onclick="clickPerson(2)"></div>
            <div id="p3" class="person" style="background-image: url('IMG_3331.jpeg');" onclick="clickPerson(3)"></div>
            <div id="p4" class="person" style="background-image: url('IMG_3333.jpeg');" onclick="clickPerson(4)"></div>
            <div id="p5" class="person" style="background-image: url('IMG_3334.jpeg');" onclick="clickPerson(5)"></div>
        </div>
    </div>

    <div class="section">
        <div class="tm-mega-button" onclick="openTM()">
            <p class="tm-title">우리가 만든 Teachable Machine 🧠</p>
            <p class="tm-desc">클릭하여 졸음 분석 인공지능 모델을 확인해보세요!</p>
        </div>
    </div>

    <div id="modal-container" class="modal-container">
        <div class="modal-content">
            <h2>About me</h2>
            <div class="modal-photo-area"><div id="mPhoto" class="modal-photo"></div></div>
            <div class="modal-body">
                <div class="info-item"><span class="info-label">이름</span> <span id="mName" class="info-content"></span></div>
                <div class="info-item"><span class="info-label">학과</span> <span class="info-content">바이오메디컬공학부</span></div>
                <div class="info-item"><span class="info-label">MBTI</span> <span id="mMbti" class="info-content"></span></div>
                <div class="info-item"><span class="info-label">소개</span> <span id="mIntro" class="info-content"></span></div>
                <div class="info-item"><span class="info-label">메일</span> <span id="mEmail" class="info-content"></span></div>
            </div>
            <div class="modal-deco"><div class="stamp">EXPLORER<br>REPORT</div></div>
            <button class="close-btn" onclick="closeInfo()">탐험 계속하기</button>
        </div>
    </div>

    <div id="tm-modal">
        <h2 style="color:#5D4037">🧠 모델 소개</h2>
        <p style="color:#795548; line-height:1.6; margin-bottom:20px;">표정과 눈 데이터를 기반으로 한 졸음 분석 모델입니다.</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="close-btn" style="background:#ccc;" onclick="closeTM()">닫기</button>
            <button class="close-btn" onclick="window.open('https://teachablemachine.withgoogle.com/models/azRfV6OJy/')">실행하기</button>
        </div>
    </div>

    <div id="overlay"></div>

    <script>
        let currentStep = 1;
        const teamData = {
            1: { name: '이지민', mbti: 'ESFJ', intro: '끊임없이 도전하며 성장하는 실행가', email: 'jimin0801@hufs.ac.kr', photo: "url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png')" },
            2: { name: '조연선', mbti: 'ISTP', intro: '누워있는게 제일 행복한 사람', email: 'cje7994@hufs.ac.kr', photo: "url('49542EE6-31E8-431D-8DE3-686F737E7B87.png')" },
            3: { name: '최현민', mbti: 'INFP', intro: '내적 신념이 깊은 열정적인 중재자', email: 'choihyunmin1003@hufs.ac.kr', photo: "url('IMG_3331.jpeg')" },
            4: { name: '김서영', mbti: 'INFJ', intro: '묵묵히 제 몫을 다하는 바위처럼 듬직한 존재', email: '202602719@hufs.ac.kr', photo: "url('IMG_3333.jpeg')" },
            5: { name: '임정규', mbti: 'ISFJ', intro: '일을 열심히 꾸준히 노력하는 대기만성형', email: 'junggyu3798@hufs.ac.kr', photo: "url('IMG_3334.jpeg')" }
        };

        window.onload = () => { 
            updateMarkers();
            const svg = document.getElementById('path-layer');
            svg.setAttribute('width', svg.parentElement.offsetWidth);
            svg.setAttribute('height', svg.parentElement.offsetHeight);
        };

        function updateMarkers() {
            for(let i=1; i<=5; i++) {
                const el = document.getElementById('p'+i);
                if(i <= currentStep) el.classList.add('active');
                else el.classList.remove('active');
            }
        }

        function clickPerson(step) {
            if(step > currentStep) return;
            const data = teamData[step];
            document.getElementById('mName').innerText = data.name;
            document.getElementById('mPhoto').style.backgroundImage = data.photo;
            document.getElementById('mMbti').innerText = data.mbti;
            document.getElementById('mIntro').innerText = data.intro;
            document.getElementById('mEmail').innerText = data.email;
            document.getElementById('modal-container').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeInfo() {
            document.getElementById('modal-container').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            if(currentStep < 5) {
                drawPath(currentStep, currentStep + 1);
                currentStep++;
                setTimeout(updateMarkers, 1500);
            }
        }

        function openTM() { document.getElementById('tm-modal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function closeTM() { document.getElementById('tm-modal').style.display='none'; document.getElementById('overlay').style.display='none'; }

        function drawPath(from, to) {
            const f = document.getElementById('p'+from), t = document.getElementById('p'+to);
            const x1 = f.offsetLeft+32, y1 = f.offsetTop+32, x2 = t.offsetLeft+32, y2 = t.offsetTop+32;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M${x1},${y1} Q${(x1+x2)/2},${Math.min(y1,y2)-50} ${x2},${y2}`);
            path.setAttribute("class", "quest-line");
            document.getElementById('path-layer').appendChild(path);
            const len = path.getTotalLength();
            path.style.strokeDashoffset = len; path.style.strokeDasharray = len;
            requestAnimationFrame(() => path.style.strokeDashoffset = "0");
        }
    </script>
</body>
</html>
