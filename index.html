<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title> 4조 탐험 지도</title>
    <style>
        body { background-color: #f4e4bc; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        h1 { color: #5d4037; text-shadow: 1px 1px 2px white; }
        
        /* 지도 컨테이너 */
        .map-wrapper { position: relative; border: 12px solid #8b4513; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; background: #eee; display: inline-block; }
        .map-wrapper img { display: block; max-width: 100%; height: auto; }
        
        /* 팀원 클릭 버튼 (얼굴 사진 동그라미) */
        .person { 
            position: absolute; width: 65px; height: 65px; 
            cursor: pointer; border-radius: 50%; border: 3px solid gold; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: transform 0.3s;
            background-size: cover; 
            background-position: center;
            background-color: white;
            color: transparent; /* 숫자 안 보이게 처리 */
        }
        .person:hover { transform: scale(1.3) rotate(10deg); z-index: 10; border-color: #ff4500; }

        /* 각 팀원 위치 (지도 위 % 위치 - 자유롭게 조절하세요) */
        #p1 { top: 32%; left: 35%; }
        #p2 { top: 52%; left: 23%; }
        #p3 { top: 71%; left: 52%; }
        #p4 { top: 48%; left: 70%; }
        #p5 { top: 25%; left: 75%; }

        /* 팝업 모달 디자인 */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 300px; padding: 25px; background: #fffcf5; border: 5px solid #8b4513; 
            border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.7); z-index: 100; text-align: center;
        }
        .modal h2 { margin: 0 0 10px 0; color: #8b4513; border-bottom: 2px dashed #8b4513; padding-bottom: 10px; }
        .modal p { margin: 8px 0; font-size: 15px; color: #444; line-height: 1.6; }
        .modal .label { font-weight: bold; color: #a0522d; }
        .modal a { color: #0066cc; text-decoration: none; word-break: break-all; font-size: 14px; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
        .close-btn { margin-top: 15px; background: #8b4513; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🗺️ 우리 팀 탐험 지도</h1>
    <p>지도 위 사진을 클릭해 팀원 정보를 확인하세요!</p>

    <div class="map-wrapper">
        <img src="IMG_3323.jpeg" alt="팀 지도">
        
        <div id="p1" class="person" style="background-image: url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png');" onclick="showInfo('이지민', '바이오메디컬공학부', 'ESFJ', '끊임없이 도전하며 성장하는 실행가', 'jimin0801@hufs.ac.kr')"></div>
        <div id="p2" class="person" style="background-image: url('IMG_3332.jpeg');" onclick="showInfo('조연선', '바이오메디컬공학부', 'ISTP', '누워있는게 제일 행복한 사람', 'cje7994@hufs.ac.kr')"></div>
        <div id="p3" class="person" style="background-image: url('IMG_3331.jpeg');" onclick="showInfo('최현민', '바이오메디컬공학부', 'INFP', '내적 신념이 깊은 열정적인 중재자', 'choihyunmin1003@hufs.ac.kr')"></div>
        <div id="p4" class="person" style="background-image: url('IMG_3333.jpeg');" onclick="showInfo('김서영', '바이오메디컬공학부', 'INFJ', '묵묵히 제 몫을 다하는 바위처럼 듬직한 존재', '202602719@hufs.ac.kr')"></div>
        <div id="p5" class="person" style="background-image: url('IMG_3334.jpeg');" onclick="showInfo('임정규', '바이오메디컬공학부', 'ISFJ', '일을 열심히 꾸준히 노력하는 대기만성형', 'junggyu3798@hufs.ac.kr')"></div>
    </div>

    <div id="overlay" class="overlay" onclick="closeInfo()"></div>
    <div id="modal" class="modal">
        <h2 id="mName">이름</h2>
        <p><span class="label">학과:</span> <span id="mDept">학과명</span></p>
        <p><span class="label">MBTI:</span> <span id="mMbti">MBTI</span></p>
        <p><span class="label">소개:</span> <br><span id="mIntro">소개말</span></p>
        <p><span class="label">메일:</span> <br><a id="mEmail" href="">이메일주소</a></p>
        <button class="close-btn" onclick="closeInfo()">탐험 계속하기</button>
    </div>

    <script>
        function showInfo(name, dept, mbti, intro, email) {
            document.getElementById('mName').innerText = name;
            document.getElementById('mDept').innerText = dept;
            document.getElementById('mMbti').innerText = mbti;
            document.getElementById('mIntro').innerText = intro;
            document.getElementById('mEmail').innerText = email;
            document.getElementById('mEmail').href = "mailto:" + email;
            
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeInfo() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
