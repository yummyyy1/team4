<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4조 탐험 지도</title>
    <style>
        body { background-color: #f4e4bc; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { color: #5d4037; text-shadow: 1px 1px 2px white; z-index: 1; margin-bottom: 0;}
        p.subtitle { margin-top: 5px; color: #7f5539; font-size: 1.1rem; font-weight: bold; }
        
        /* 지도 컨테이너 */
        .map-wrapper { position: relative; border: 12px solid #8b4513; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; background: #eee; display: inline-block; }
        .map-wrapper img { display: block; max-width: 100%; height: auto; }
        
        /* SVG 경로 레이어 */
        #path-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .quest-line { stroke: #FFD700; stroke-width: 6; stroke-dasharray: 12, 12; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.9)); transition: stroke-dashoffset 1.5s ease-in-out; stroke-dashoffset: 1000; }

        /* 지도 위 버튼 */
        .person { 
            position: absolute; width: 65px; height: 65px; 
            cursor: pointer; z-index: 10; border-radius: 50%;
            border: 3px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            background-size: cover; background-position: center;
            transition: transform 0.3s ease, filter 0.3s, opacity 0.3s;
            filter: grayscale(80%); opacity: 0.8;
        }
        .person.active { filter: grayscale(0%); opacity: 1; pointer-events: auto; }
        .person.locked { pointer-events: none; }
        .person.active:hover { transform: scale(2) rotate(5deg); z-index: 20; border-color: gold; }

        /* 위치 설정 */
        #p1 { top: 32%; left: 18%; }
        #p2 { top: 49%; left: 30%; }
        #p3 { top: 55%; left: 58%; }
        #p4 { top: 48%; left: 88%; }
        #p5 { top: 25%; left: 80%; }

        /* 탐험 완료하기 버튼 스타일 */
        .finish-btn {
            position: absolute; bottom: 20px; right: 20px;
            padding: 10px 20px; background: #5d4037; color: white;
            border: 2px solid gold; border-radius: 10px; cursor: pointer;
            font-weight: bold; z-index: 30; transition: 0.3s;
        }
        .finish-btn:hover { background: #8b4513; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* 팝업 모달 스타일 */
        .modal-container { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 300px; height: 430px; 
            perspective: 1000px; z-index: 100; 
        }
        .modal-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .modal-container.flipped .modal-inner { transform: rotateY(180deg); }
        .modal-front, .modal-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 5px solid gold; box-shadow: 0 0 50px rgba(0,0,0,0.7); overflow: hidden; display: flex; flex-direction: column; background: #fffcf5; }
        .modal-front-photo { width: 100%; height: 300px; background-size: cover; background-position: center; border-bottom: 5px solid gold; }
        .modal-front h2 { margin: auto; color: #5d4037; font-size: 2rem; }
        .click-hint { font-size: 0.9rem; color: #a0522d; margin-bottom: 15px; text-align: center; font-weight: bold; }
        
        .modal-back { transform: rotateY(180deg); padding: 25px 20px; text-align: center; justify-content: flex-start; }
        .modal-back h3 { color: #8b4513; border-bottom: 2px dashed gold; padding-bottom: 8px; margin-top: 0; margin-bottom: 10px; }
        .info-item { margin: 8px 0; font-size: 0.95rem; color: #5d4037; text-align: left; }
        .info-label { font-weight: bold; color: #8b4513; display: inline-block; width: 65px; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
        .next-btn { margin-top: auto; margin-bottom: 15px; background: #8b4513; color: white; border: none; padding: 10px 0; width: 85%; align-self: center; cursor: pointer; border-radius: 25px; font-weight: bold; }

        /* 시작 화면 */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; transition: 0.5s; }
        .start-btn { padding: 15px 40px; font-size: 1.5rem; background: #8b4513; color: white; border: 3px solid gold; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-size: 3rem; color: gold;">📜 4조 탐험 기록</h2>
        <button class="start-btn" onclick="startAdventure()">탐험 시작하기</button>
    </div>

    <h1>🗺️ 4조 탐험 지도</h1>
    <p class="subtitle">팀원을 클릭하여 탐험해보세요!</p>

    <div class="map-wrapper">
        <img src="85E5E5D9-C0CF-44FB-BA94-082BD6E083EB.png" alt="팀 지도">
        <svg id="path-layer" width="100%" height="100%"></svg>
        
        <div id="p1" class="person locked" style="background-image: url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png');" onclick="clickPerson(1)"></div>
        <div id="p2" class="person locked" style="background-image: url('IMG_3332.jpeg');" onclick="clickPerson(2)"></div>
        <div id="p3" class="person locked" style="background-image: url('IMG_3331.jpeg');" onclick="clickPerson(3)"></div>
        <div id="p4" class="person locked" style="background-image: url('IMG_3333.jpeg');" onclick="clickPerson(4)"></div>
        <div id="p5" class="person locked" style="background-image: url('IMG_3334.jpeg');" onclick="clickPerson(5)"></div>

        <button class="finish-btn" onclick="finishAll()">탐험 완료하기</button>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="modal-container" class="modal-container">
        <div class="modal-inner" onclick="this.parentElement.classList.toggle('flipped')">
            <div class="modal-front">
                <div id="mPhoto" class="modal-front-photo"></div>
                <h2 id="mName">이름</h2>
                <div class="click-hint">상세정보 보기 🔄</div>
            </div>
            <div class="modal-back">
                <h3 id="mNameBack">이름</h3>
                <div class="info-item"><span class="info-label">학교</span> <span>한국외국어대학교</span></div>
                <div class="info-item"><span class="info-label">학과</span> <span>바이오메디컬공학부</span></div>
                <div class="info-item"><span class="info-label">MBTI</span> <span id="mMbti"></span></div>
                <div class="info-item"><span class="info-label">소개</span> <br><span id="mIntro" style="font-size:0.85rem;"></span></div>
                <div class="info-item"><span class="info-label">연락처</span> <span id="mPhone"></span></div>
                <div class="info-item"><span class="info-label">메일</span> <br><span id="mEmail" style="font-size:0.8rem;"></span></div>
                <button class="next-btn" onclick="event.stopPropagation(); closeInfo();">탐험 계속하기</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 0;
        const teamData = {
            1: { name: '이지민', mbti: 'ESFJ', intro: '끊임없이 도전하며 성장하는 실행가', phone: '010-6312-6561', email: 'jimin0801@hufs.ac.kr', photo: "url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png')" },
            2: { name: '조연선', mbti: 'ISTP', intro: '누워있는게 제일 행복한 사람', phone: '010-2105-4280', email: 'cje7994@hufs.ac.kr', photo: "url('IMG_3332.jpeg')" },
            3: { name: '최현민', mbti: 'INFP', intro: '내적 신념이 깊은 열정적인 중재자', phone: '010-4127-1879', email: 'choihyunmin1003@hufs.ac.kr', photo: "url('IMG_3331.jpeg')" },
            4: { name: '김서영', mbti: 'INFJ', intro: '묵묵히 제 몫을 다하는 바위처럼 듬직한 존재', phone: '010-7635-1312', email: '202602719@hufs.ac.kr', photo: "url('IMG_3333.jpeg')" },
            5: { name: '임정규', mbti: 'ISFJ', intro: '일을 열심히 꾸준히 노력하는 대기만성형', phone: '010-3590-3798', email: 'junggyu3798@hufs.ac.kr', photo: "url('IMG_3334.jpeg')" }
        };

        function startAdventure() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                activatePerson(1);
            }, 500);
        }

        function activatePerson(step) {
            currentStep = step;
            const target = document.getElementById('p' + step);
            target.classList.remove('locked');
            target.classList.add('active');
        }

        function clickPerson(step) {
            if (step !== currentStep && !document.getElementById('p'+step).classList.contains('active')) return;
            const data = teamData[step];
            document.getElementById('mName').innerText = data.name;
            document.getElementById('mNameBack').innerText = data.name;
            document.getElementById('mPhoto').style.backgroundImage = data.photo;
            document.getElementById('mMbti').innerText = data.mbti;
            document.getElementById('mIntro').innerText = data.intro;
            document.getElementById('mPhone').innerText = data.phone; // 전화번호 반영
            document.getElementById('mEmail').innerText = data.email;

            document.getElementById('modal-container').classList.remove('flipped');
            document.getElementById('modal-container').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeInfo() {
            document.getElementById('modal-container').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            if (currentStep < 5) {
                const nextStep = currentStep + 1;
                drawPath(currentStep, nextStep); 
                setTimeout(() => { activatePerson(nextStep); }, 1000);
            } else {
                alert("🎉 모든 팀원을 만났습니다! 탐험을 완료하였습니다.");
            }
        }

        function finishAll() {
            for(let i=1; i<5; i++) {
                if(!document.getElementById('line-'+i)) {
                    drawPath(i, i+1, true); 
                }
            }
            for(let i=1; i<=5; i++) {
                const p = document.getElementById('p' + i);
                p.classList.remove('locked');
                p.classList.add('active');
            }
            currentStep = 5;
            alert("탐험을 완료하였습니다!");
        }

        function drawPath(fromIdx, toIdx, instant = false) {
            if(document.getElementById('line-'+fromIdx)) return;
            const fromEl = document.getElementById('p' + fromIdx);
            const toEl = document.getElementById('p' + toIdx);
            const svg = document.getElementById('path-layer');
            const x1 = fromEl.offsetLeft + 32.5;
            const y1 = fromEl.offsetTop + 32.5;
            const x2 = toEl.offsetLeft + 32.5;
            const y2 = toEl.offsetTop + 32.5;
            const newLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (x1 + x2) / 2 + (toIdx % 2 === 0 ? 30 : -30); 
            const midY = (y1 + y2) / 2 - 50;
            const d = `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
            newLine.setAttribute("d", d);
            newLine.setAttribute("class", "quest-line");
            newLine.setAttribute("id", "line-" + fromIdx);
            svg.appendChild(newLine);
            if(instant) {
                newLine.style.transition = 'none';
                newLine.style.strokeDashoffset = "0";
            } else {
                setTimeout(() => { newLine.style.strokeDashoffset = "0"; }, 50);
            }
        }
    </script>
</body>
</html>
