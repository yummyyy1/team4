<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4조 탐험 지도</title>
    <style>
        body { background-color: #f4e4bc; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { color: #5d4037; text-shadow: 1px 1px 2px white; z-index: 1; }
        
        /* 시작 화면 */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; transition: 0.5s; }
        #start-screen h2 { font-size: 3rem; margin-bottom: 20px; color: gold; text-align: center; }
        .start-btn { padding: 15px 40px; font-size: 1.5rem; background: #8b4513; color: white; border: 3px solid gold; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .start-btn:hover { transform: scale(1.1); background: #a0522d; }

        /* 지도 컨테이너 */
        .map-wrapper { position: relative; border: 12px solid #8b4513; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; background: #eee; display: inline-block; }
        .map-wrapper img { display: block; max-width: 100%; height: auto; }
        
        /* SVG 경로 레이어 */
        #path-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        /* 황금색 점선 스타일 */
        .quest-line { 
            stroke: #FFD700; 
            stroke-width: 6; 
            stroke-dasharray: 12, 12; 
            fill: none; 
            stroke-linecap: round; 
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.9));
            transition: stroke-dashoffset 1.5s ease-in-out; 
            stroke-dashoffset: 1000; /* 처음에 숨김 */
        }

        /* 팀원 사진 버튼 */
        .person { 
            position: absolute; width: 65px; height: 65px; 
            cursor: pointer; border-radius: 50%; border: 3px solid white; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); transition: 0.5s;
            background-size: cover; background-position: center;
            z-index: 10; opacity: 0; transform: scale(0); pointer-events: none; /* 처음에 아예 안 보임 */
        }
        /* 활성화 상태 */
        .person.active { opacity: 1; transform: scale(1); pointer-events: auto; border-color: gold; }
        .person:hover { transform: scale(1.3) rotate(10deg); z-index: 15; border-color: #ff4500; }

        /* 위치 설정 */
        #p1 { top: 32%; left: 35%; }
        #p2 { top: 52%; left: 23%; }
        #p3 { top: 71%; left: 52%; }
        #p4 { top: 48%; left: 70%; }
        #p5 { top: 25%; left: 75%; }

        /* 팝업 모달 */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; padding: 25px; background: #fffcf5; border: 5px solid #8b4513; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.7); z-index: 100; text-align: center; }
        .modal h2 { margin: 0 0 10px 0; color: #8b4513; border-bottom: 2px dashed #8b4513; padding-bottom: 10px; }
        .label { font-weight: bold; color: #a0522d; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
        .close-btn { margin-top: 15px; background: #8b4513; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>📜 4조 탐험 기록</h2>
        <button class="start-btn" onclick="startAdventure()">탐험 시작하기</button>
    </div>

    <h1>🗺️ 우리 팀 탐험 지도</h1>

    <div class="map-wrapper" id="map-container">
        <img src="85E5E5D9-C0CF-44FB-BA94-082BD6E083EB.png" alt="팀 지도">
        <svg id="path-layer" width="100%" height="100%"></svg>
        
        <div id="p1" class="person" style="background-image: url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png');" onclick="clickPerson(1, '이지민', '바이오메디컬공학부', 'ESFJ', '끊임없이 도전하며 성장하는 실행가', 'jimin0801@hufs.ac.kr')"></div>
        <div id="p2" class="person" style="background-image: url('IMG_3332.jpeg');" onclick="clickPerson(2, '조연선', '바이오메디컬공학부', 'ISTP', '누워있는게 제일 행복한 사람', 'cje7994@hufs.ac.kr')"></div>
        <div id="p3" class="person" style="background-image: url('IMG_3331.jpeg');" onclick="clickPerson(3, '최현민', '바이오메디컬공학부', 'INFP', '내적 신념이 깊은 열정적인 중재자', 'choihyunmin1003@hufs.ac.kr')"></div>
        <div id="p4" class="person" style="background-image: url('IMG_3333.jpeg');" onclick="clickPerson(4, '김서영', '바이오메디컬공학부', 'INFJ', '묵묵히 제 몫을 다하는 바위처럼 듬직한 존재', '202602719@hufs.ac.kr')"></div>
        <div id="p5" class="person" style="background-image: url('IMG_3334.jpeg');" onclick="clickPerson(5, '임정규', '바이오메디컬공학부', 'ISFJ', '일을 열심히 꾸준히 노력하는 대기만성형', 'junggyu3798@hufs.ac.kr')"></div>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="modal" class="modal">
        <h2 id="mName">이름</h2>
        <p><span class="label">학과:</span> <span id="mDept">학과명</span></p>
        <p><span class="label">MBTI:</span> <span id="mMbti">MBTI</span></p>
        <p><span class="label">소개:</span> <br><span id="mIntro">소개말</span></p>
        <p><span class="label">메일:</span> <br><a id="mEmail" href="">이메일주소</a></p>
        <button class="close-btn" onclick="closeInfo()">다음 장소로</button>
    </div>

    <script>
        let currentStep = 0;

        function startAdventure() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                showPerson(1); // 첫 번째 사람 등장
            }, 500);
        }

        function showPerson(step) {
            currentStep = step;
            const person = document.getElementById('p' + step);
            person.classList.add('active');
        }

        function clickPerson(step, name, dept, mbti, intro, email) {
            if (step !== currentStep) return;
            showModal(name, dept, mbti, intro, email);
        }

        function showModal(name, dept, mbti, intro, email) {
            document.getElementById('mName').innerText = name;
            document.getElementById('mDept').innerText = dept;
            document.getElementById('mMbti').innerText = mbti;
            document.getElementById('mIntro').innerText = intro;
            document.getElementById('mEmail').innerText = email;
            document.getElementById('mEmail').href = "mailto:" + email;
            
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeInfo() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            
            // 정보창을 닫으면 다음 길을 먼저 그리고, 그 다음 사람이 나타남
            if (currentStep < 5) {
                const nextStep = currentStep + 1;
                drawPath(currentStep, nextStep); // 길 먼저 그리기
                
                // 길이 그려지는 시간(약 1.5초) 뒤에 다음 사람 등장
                setTimeout(() => {
                    showPerson(nextStep);
                }, 1200);
            } else {
                alert("🎉 4조의 모든 탐험을 마쳤습니다!");
            }
        }

        function drawPath(fromIdx, toIdx) {
            const fromEl = document.getElementById('p' + fromIdx);
            const toEl = document.getElementById('p' + toIdx);
            const svg = document.getElementById('path-layer');

            const x1 = fromEl.offsetLeft + 32.5;
            const y1 = fromEl.offsetTop + 32.5;
            const x2 = toEl.offsetLeft + 32.5;
            const y2 = toEl.offsetTop + 32.5;

            const newLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (x1 + x2) / 2 + (toIdx % 2 === 0 ? 30 : -30); 
            const midY = (y1 + y2) / 2 - 50;
            const d = `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
            
            newLine.setAttribute("d", d);
            newLine.setAttribute("class", "quest-line");
            newLine.id = "line-" + fromIdx;
            
            svg.appendChild(newLine);

            // 점선이 흐르는 애니메이션 실행
            setTimeout(() => {
                newLine.style.strokeDashoffset = "0";
            }, 50);
        }
    </script>
</body>
</html>
