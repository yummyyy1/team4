<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4조 탐험 지도</title>
    <style>
        body { background-color: #f4e4bc; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { color: #5d4037; text-shadow: 1px 1px 2px white; z-index: 1; margin-bottom: 0;}
        p.subtitle { margin-top: 5px; color: #7f5539; font-size: 1.1rem; }
        
        /* 지도 컨테이너 */
        .map-wrapper { position: relative; border: 12px solid #8b4513; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; background: #eee; display: inline-block; }
        .map-wrapper img { display: block; max-width: 100%; height: auto; }
        
        /* SVG 경로 레이어 */
        #path-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .quest-line { stroke: #FFD700; stroke-width: 6; stroke-dasharray: 12, 12; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.9)); transition: stroke-dashoffset 1.5s ease-in-out; stroke-dashoffset: 1000; }

        /* 팀원 사진 버튼 (플립 카드 컨테이너) */
        .person { 
            position: absolute; width: 65px; height: 65px; 
            cursor: pointer; z-index: 10; 
            opacity: 0; transform: scale(0); pointer-events: none;
            transition: opacity 0.5s, transform 0.5s ease;
            perspective: 1000px; 
        }
        .person.active { opacity: 1; transform: scale(1); pointer-events: auto; }

        /* 마우스 호버 시 2배 확대 */
        .person.active:hover { transform: scale(2) rotate(5deg); z-index: 20; }

        /* 플립 카드 내부 박스 */
        .person-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .person.flipped .person-inner { transform: rotateY(180deg); }

        /* 카드의 앞면(사진)과 뒷면(정보) */
        .person-front, .person-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 50%; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; background-size: cover; background-position: center; }

        /* 카드 앞면: 원래 버튼 이미지 유지 */
        .person-front { background-color: white; }
        .person-front span.name-label { position: absolute; bottom: 5px; width: 100%; background: rgba(0,0,0,0.5); color: white; font-size: 10px; z-index: 2; }

        /* 카드 뒷면: 정보창 */
        .person-back { background-color: #fffcf5; transform: rotateY(180deg); color: #5d4037; font-size: 8px; line-height: 1.2; padding: 5px; border: 2px solid gold; box-sizing: border-box; }
        .person-back strong { color: #8b4513; font-size: 9px; }
        
        /* 현재 위치 수치 적용 */
        #p1 { top: 32%; left: 26%; }
        #p2 { top: 45%; left: 30%; }
        #p3 { top: 55%; left: 58%; }
        #p4 { top: 48%; left: 88%; }
        #p5 { top: 25%; left: 80%; }

        /* 팝업 모달: 네모난 사진 & 이름만 */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: #fffcf5; border: 5px solid gold; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.7); z-index: 100; text-align: center; overflow: hidden; }
        .modal .modal-photo { width: 100%; height: 200px; background-size: cover; background-position: center; border-bottom: 5px solid gold; }
        .modal h2 { margin: 15px 0; color: #5d4037; font-size: 1.8rem; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
        .close-btn { margin-bottom: 20px; background: #8b4513; color: white; border: none; padding: 10px 25px; cursor: pointer; border-radius: 20px; font-weight: bold; }

        /* 시작 화면 */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; transition: 0.5s; }
        .start-btn { padding: 15px 40px; font-size: 1.5rem; background: #8b4513; color: white; border: 3px solid gold; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-size: 3rem; color: gold;">📜 4조 탐험 기록</h2>
        <button class="start-btn" onclick="startAdventure()">탐험 시작하기</button>
    </div>

    <h1>🗺️ 4조 탐험 지도</h1>
    <p class="subtitle">지도 위 사진을 클릭해 팀원 정보를 확인하세요!</p>

    <div class="map-wrapper">
        <img src="85E5E5D9-C0CF-44FB-BA94-082BD6E083EB.png" alt="팀 지도">
        <svg id="path-layer" width="100%" height="100%"></svg>
        
        <div id="p1" class="person" onclick="clickPerson(1)">
            <div class="person-inner">
                <div class="person-front" style="background-image: url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png');"></div>
                <div class="person-back"><strong>이지민</strong><br>바이오메디컬공학부<br>MBTI: ESFJ<br>jimin0801@hufs.ac.kr</div>
            </div>
        </div>
        
        <div id="p2" class="person" onclick="clickPerson(2)">
            <div class="person-inner">
                <div class="person-front" style="background-image: url('IMG_3332.jpeg');"></div>
                <div class="person-back"><strong>조연선</strong><br>바이오메디컬공학부<br>MBTI: ISTP<br>cje7994@hufs.ac.kr</div>
            </div>
        </div>

        <div id="p3" class="person" onclick="clickPerson(3)">
            <div class="person-inner">
                <div class="person-front" style="background-image: url('IMG_3331.jpeg');"></div>
                <div class="person-back"><strong>최현민</strong><br>바이오메디컬공학부<br>MBTI: INFP<br>choihyunmin1003@hufs.ac.kr</div>
            </div>
        </div>

        <div id="p4" class="person" onclick="clickPerson(4)">
            <div class="person-inner">
                <div class="person-front" style="background-image: url('IMG_3333.jpeg');"></div>
                <div class="person-back"><strong>김서영</strong><br>바이오메디컬공학부<br>MBTI: INFJ<br>202602719@hufs.ac.kr</div>
            </div>
        </div>

        <div id="p5" class="person" onclick="clickPerson(5)">
            <div class="person-inner">
                <div class="person-front" style="background-image: url('IMG_3334.jpeg');"></div>
                <div class="person-back"><strong>임정규</strong><br>바이오메디컬공학부<br>MBTI: ISFJ<br>junggyu3798@hufs.ac.kr</div>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="modal" class="modal">
        <div id="mPhoto" class="modal-photo"></div>
        <h2 id="mName">이름</h2>
        <button class="close-btn" onclick="closeInfo()">다음 장소로</button>
    </div>

    <script>
        let currentStep = 0;
        const teamData = {
            1: { name: '이지민', photo: "url('CFF4EA87-BC95-42C1-8E9C-12C0C6D76BA0.png')" },
            2: { name: '조연선', photo: "url('IMG_3332.jpeg')" },
            3: { name: '최현민', photo: "url('IMG_3331.jpeg')" },
            4: { name: '김서영', photo: "url('IMG_3333.jpeg')" },
            5: { name: '임정규', photo: "url('IMG_3334.jpeg')" }
        };

        function startAdventure() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                showPerson(1); 
            }, 500);
        }

        function showPerson(step) {
            currentStep = step;
            document.getElementById('p' + step).classList.add('active');
        }

        function clickPerson(step) {
            if (step !== currentStep) return;
            const data = teamData[step];
            document.getElementById('mName').innerText = data.name;
            document.getElementById('mPhoto').style.backgroundImage = data.photo;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeInfo() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            
            // 팝업 닫을 때 지도 위 버튼을 뒤집어서 정보 노출
            const currentPerson = document.getElementById('p' + currentStep);
            currentPerson.classList.add('flipped');

            if (currentStep < 5) {
                const nextStep = currentStep + 1;
                drawPath(currentStep, nextStep); 
                setTimeout(() => { showPerson(nextStep); }, 1200);
            } else {
                alert("🎉 4조의 모든 탐험을 마쳤습니다!");
            }
        }

        function drawPath(fromIdx, toIdx) {
            const fromEl = document.getElementById('p' + fromIdx);
            const toEl = document.getElementById('p' + toIdx);
            const svg = document.getElementById('path-layer');

            const x1 = fromEl.offsetLeft + 32.5;
            const y1 = fromEl.offsetTop + 32.5;
            const x2 = toEl.offsetLeft + 32.5;
            const y2 = toEl.offsetTop + 32.5;

            const newLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (x1 + x2) / 2 + (toIdx % 2 === 0 ? 30 : -30); 
            const midY = (y1 + y2) / 2 - 50;
            const d = `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`;
            
            newLine.setAttribute("d", d);
            newLine.setAttribute("class", "quest-line");
            svg.appendChild(newLine);

            setTimeout(() => { newLine.style.strokeDashoffset = "0"; }, 50);
        }
    </script>
</body>
</html>
